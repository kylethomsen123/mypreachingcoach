<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finding Your Sermon — My Preaching Coach</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body     { background-color: #f4f6f9; }
    .hero    { background-color: #19376e; color: #fff; padding: 2.75rem 1rem 2.25rem; }
    .hero h1 { font-size: 2.1rem; font-weight: 700; letter-spacing: -.5px; }
    .card    { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .spinner-ring {
      width: 56px; height: 56px;
      border: 5px solid #dee2e6;
      border-top-color: #19376e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="hero text-center">
  <h1>My Preaching Coach</h1>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-9 col-md-7 col-lg-5 text-center">

      <div class="card p-5">
        <div class="spinner-ring"></div>

        <h2 class="fw-bold mb-2">Finding your sermon&hellip;</h2>
        <p class="text-muted mb-0">
          We're listening to your recording to identify where the preaching starts and ends.
          This takes about 2&ndash;3 minutes.
        </p>
      </div>

      <p class="text-muted mt-4" style="font-size:.85rem;">
        Don't close this tab — you'll be redirected automatically when we're done.
      </p>

    </div>
  </div>
</div>

<script>
(function poll() {
  fetch("/detecting-status/{{ pending_id }}")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === "auto_submitted") {
        window.location.href = "/submitted";
      } else if (data.status === "ready") {
        window.location.href = "/confirm/{{ pending_id }}";
      } else if (data.status === "expired") {
        window.location.href = "/";
      } else {
        setTimeout(poll, 3000);
      }
    })
    .catch(function() { setTimeout(poll, 5000); });
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Report on its way — My Preaching Coach</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body     { background-color: #f4f6f9; }
    .hero    { background-color: #19376e; color: #fff; padding: 2.75rem 1rem 2.25rem; }
    .hero h1 { font-size: 2.1rem; font-weight: 700; letter-spacing: -.5px; }
    .check   { font-size: 4rem; line-height: 1; }
  </style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────────────────── -->
<div class="hero text-center">
  <h1>My Preaching Coach</h1>
</div>

<!-- ── Confirmation ──────────────────────────────────────────────────── -->
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-9 col-md-7 col-lg-5 text-center">

      <div class="check mb-3">&#9989;</div>

      <h2 class="fw-bold mb-3">You're all set.</h2>

      <p class="lead mb-2">
        We're analyzing the sermon now. Check your inbox in about
        5 minutes &mdash; your report will arrive as a PDF attachment.
      </p>

      <p class="text-muted mb-4" style="font-size:.9rem;">
        Didn't get it? Check your spam folder or reply to the email for help.
      </p>

      <a href="/" class="btn btn-outline-primary px-4">
        Analyze another sermon &rarr;
      </a>

    </div>
  </div>
</div>

</body>
</html>
